<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="firebase-config.js"></script>

<script>

firebase.initializeApp(firebaseConfig)
const db = firebase.firestore()

let timer

function salvarRealtime(){

clearTimeout(timer)

timer = setTimeout(()=>{

const texto = document.getElementById("txt").value

db.collection("rdo_operadores").doc("live").set({
texto:texto,
timestamp:new Date()
})

},600)

}

function enviarWhats(){

const texto = document.getElementById("txt").value

window.open(
"https://wa.me/?text="+encodeURIComponent(texto),
"_blank"
)

db.collection("rdo_operadores").add({
texto:texto,
timestamp:new Date()
})

}

</script>

</head>

<body>

<h2>RDO Operadores</h2>

<textarea id="txt" oninput="salvarRealtime()" style="width:100%;height:300px"></textarea>

<br><br>

<button onclick="enviarWhats()">Enviar WhatsApp</button>

</body>
</html>
