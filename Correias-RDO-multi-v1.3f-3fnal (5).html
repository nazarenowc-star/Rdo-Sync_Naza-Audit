<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDO Operadores - Entrada de Dados</title>
    <style>
        * {

        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f3f6fb 0%, #eef2f7 100%);

            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #005c8f 0%, #2d6acb 100%);

        .card {

        .card h2 {

            margin-bottom: 15px;

            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            font-family: 'Consolas', 'Monaco', monospace;
            background: #fafbfc;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #005c8f;
            background: white;
            box-shadow: 0 0 0 3px rgba(0,92,143,0.1);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 200px;
            padding: 18px 30px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #005c8f 0%, #2d6acb 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(0,92,143,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,92,143,0.4);
        }

        .btn-secondary {
            background: #f3f6fb;
            color: #4b5563;
            border: 2px solid #e5e7eb;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .status {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .status.processing {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .template-selector {
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .sync-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
        }

        .sync-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .hidden-frame {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Indicador de Sync -->
    <div class="sync-indicator" id="syncStatus">
        <div class="sync-dot"></div>

    <div class="container">

                    <option value="turno_d">Turno D - PadrГЈo</option>
                    <option value="turno_c">Turno C - PadrГЈo</option>
                    <option value="checklist">Checklist Completo</option>

            <h2>рџ“‹ Texto do RelatГіrio</h2>

Boa noite. Lokotrack 03 operou normal. Correia 56 parou 2 vezes com baixa velocidade. Hopper 12 com acГєmulo de material."></textarea>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="processarEAbrir()" id="btnProcessar">
                    <span>рџљЂ</span> Processar no Comparador V70
                </button>
                <button class="btn btn-secondary" onclick="limpar()">

    <!-- Frame oculto para carregar o comparador em background -->
    <iframe id="comparadorFrame" class="hidden-frame"></iframe>

    <script>
        // ==================== SYNC SYSTEM ====================
        const SyncManager = {
            db: null,
            collection: 'rdo_relatorios',
            
            init() {
                // Inicializar Firebase se disponГ­vel
                if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                    this.db = firebase.firestore();
                    console.log('вњ… Sync: Firebase conectado');
                } else {
                    console.log('вЏі Sync: Aguardando Firebase...');
                    setTimeout(() => this.init(), 1000);
                }
            },

            async save(text) {
                if (!this.db) {
                    // Fallback: salvar no localStorage
                    localStorage.setItem('rdo_pendente', text);
                    localStorage.setItem('rdo_timestamp', Date.now());
                    return { local: true };
                }

                try {
                    const doc = await this.db.collection(this.collection).add({
                        text: text,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        status: 'pendente',
                        source: 'rdo_operadores'
                    });
                    return { id: doc.id, local: false };
                } catch (e) {
                    console.error('Erro ao salvar:', e);
                    localStorage.setItem('rdo_pendente', text);
                    return { local: true, error: e };
                }
            }
        };

        // Inicializar sync
        SyncManager.init();

        // ==================== TEMPLATES ====================
        const templates = {
            turno_d: `рџ§­ RDO-OPERAГ‡ГѓO SISTEMA DE CORREIAS
в”њв”Ђ Data: ${new Date().toISOString().split('T')[0]}
в”њв”Ђ Turno: D
в”њв”Ђ Operador:

в”‚  в”њв”Ђ Sistema: Sul 02
в”‚  в”њв”Ђ рџ”ґ CrГ­ticos
в”‚  в”‚  - Roletes/tambores: OK
в”‚  в”‚  - Alinhamento: OK
в”‚  в”‚  - Emendas/Cobertura: OK
в”‚  в”‚  - Raspadores: OK
в”‚  в”‚  - VedaГ§ГЈo de chutes: OK
в”‚  в”њв”Ђ рџџ  Preventivos
в”‚  в”‚  - LubrificaГ§ГЈo: OK
в”‚  в”‚  - Motor (A/Temp): OK
в”‚  в”‚  - Raspadores secundГЎrios: OK
в”‚  в”‚  - Retorno limpo: OK
в”‚  в”‚  - Roletes de impacto: OK
в”‚  в”њв”Ђ рџџў Melhoria
в”‚  в”‚  - Treinamento: OK
в”‚  в”‚  - Registro de falhas: OK
в”‚  в”‚  - Sensores: OK
в”‚  в”‚  - Ambiental: OK
в”‚  в””в”Ђ рџ“ќ 

в”њв”Ђ рџЋЇ 11CR14 вЂ” Carregador 14
в”‚  в”њв”Ђ Sistema: Sul 02
в”‚  в”њв”Ђ рџ”ґ CrГ­ticos
в”‚  в”‚  - Roletes/tambores: OK
в”‚  в”‚  - Alinhamento: OK
в”‚  в”‚  - Emendas/Cobertura: OK
в”‚  в”‚  - Raspadores: OK
в”‚  в”‚  - VedaГ§ГЈo de chutes: OK
в”‚  в”њв”Ђ рџџ  Preventivos
в”‚  в”‚  - LubrificaГ§ГЈo: OK
в”‚  в”‚  - Motor (A/Temp): OK
в”‚  в”‚  - Raspadores secundГЎrios: OK
в”‚  в”‚  - Retorno limpo: OK
в”‚  в”‚  - Roletes de impacto: OK
в”‚  в”њв”Ђ рџџў Melhoria
в”‚  в”‚  - Treinamento: OK
в”‚  в”‚  - Registro de falhas: OK
в”‚  в”‚  - Sensores: OK
в”‚  в”‚  - Ambiental: OK
в”‚  в””в”Ђ рџ“ќ 

в”њв”Ђ рџЋЇ 11CV68 вЂ” Correia 68
в”‚  в”њв”Ђ Sistema: Sul 02
в”‚  в”њв”Ђ рџ”ґ CrГ­ticos
в”‚  в”‚  - Roletes/tambores: OK

в”‚  в”‚  - Emendas/Cobertura: OK

в”‚  в”‚  - LubrificaГ§ГЈo: OK
в”‚  в”‚  - Motor (A/Temp): OK

в”‚  в”‚  - Retorno limpo: OK

в”‚  в”‚  - Sensores: OK

в”‚  в””в”Ђ рџ“ќ 

рџ“Ћ Fotos: anexadas separadamente`,

            livre: `Boa noite a todos.

Turno D - OperaГ§ГЈo normal.

Lokotrack 03 operou sem anormalidades. Realizada inspeГ§ГЈo preventiva.

Correia 56 apresentou parada por baixa velocidade Г s 14:30, retomou operaГ§ГЈo normal apГіs 10 minutos.

Hopper 12 com acГєmulo de material na estrutura, necessГЎria limpeza no prГіximo turno.

Sem ocorrГЄncias crГ­ticas.`

        };

        function loadTemplate() {
            const select = document.getElementById('templateSelect');
            const text = templates[select.value];
            if (text) {
                document.getElementById('rdoText').value = text;
            }
        }

        function limpar() {
            document.getElementById('rdoText').value = '';
            document.getElementById('status').className = 'status';
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status show ' + type;
        }

        // ==================== PROCESSAMENTO PRINCIPAL ====================
        async function processarEAbrir() {
            const text = document.getElementById('rdoText').value.trim();
            const btn = document.getElementById('btnProcessar');

            if (!text) {
                showStatus('вќЊ Cole o relatГіrio primeiro!', 'error');
                return;
            }

            // Desabilitar botГЈo e mostrar loading
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Processando...';
            showStatus('вЏі Salvando e sincronizando dados...', 'processing');

            try {
                // 1. Salvar no Firebase/LocalStorage
                const result = await SyncManager.save(text);
                console.log('рџ’ѕ Dados salvos:', result);

                // 2. Salvar no localStorage para o comparador ler
                localStorage.setItem('rdo_texto_operadores', text);
                localStorage.setItem('rdo_data_envio', new Date().toISOString());
                localStorage.setItem('rdo_processar_agora', 'true');

                // 3. Mostrar sucesso
                showStatus('вњ… Dados sincronizados! Abrindo Comparador V70...', 'success');

                // 4. Abrir o comparador em nova aba (vai processar automaticamente)
                setTimeout(() => {
                    const comparadorUrl = 'Comparador_V70_GRAFICOS_ORIGINAIS_OP_FIX2_TABLESYS (2).html';
                    
                    // Tentar abrir em nova aba
                    const newWindow = window.open(comparadorUrl, '_blank');
                    
                    if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                        // Popup bloqueado, redirecionar na mesma aba
                        showStatus('рџ”„ Redirecionando...', 'processing');
                        setTimeout(() => {
                            window.location.href = comparadorUrl;
                        }, 1000);
                    } else {
                        // Nova aba aberta com sucesso
                        showStatus('вњ… Comparador V70 aberto em nova aba! Processando automaticamente...', 'success');
                        
                        // Limpar para prГіximo uso
                        setTimeout(() => {
                            document.getElementById('rdoText').value = '';
                            btn.disabled = false;
                            btn.innerHTML = '<span>рџљЂ</span> Processar no Comparador V70';
                        }, 3000);
                    }
                }, 1500);

            } catch (error) {
                console.error('Erro:', error);
                showStatus('вќЊ Erro ao processar: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<span>рџљЂ</span> Processar no Comparador V70';
            }
        }

        // ==================== AUTO-LOAD ====================
        // Verificar se tem dados pendentes do operador (quando volta da pГЎgina do comparador)
        window.addEventListener('load', () => {
            const pendente = localStorage.getItem('rdo_pendente');
            if (pendente && document.getElementById('rdoText').value === '') {
                if (confirm('рџ“ќ Existe um relatГіrio pendente. Deseja carregГЎ-lo?')) {
                    document.getElementById('rdoText').value = pendente;
                }
            }
        });

        // Atalhos de teclado
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                processarEAbrir();
            }
        });
    </script>

    <!-- Firebase (caso esteja disponГ­vel no projeto) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <script src="firebase-config.js"></script>
</body>
</html>
