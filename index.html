<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sala de Controle - Correias</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1a2b;
color:white;
}

header{
background:#122c44;
padding:12px;
display:flex;
gap:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
height:calc(100vh - 60px);
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
}
</style>
</head>

<body>

<header>
<button onclick="inicio()">🏠 Início</button>
<button onclick="abrirRDO()">RDO</button>
<button onclick="abrirComparador()">Comparador</button>
</header>

<div class="container">
<iframe id="rdo" src="rdo.html"></iframe>
<iframe id="comparador" src="comparador.html"></iframe>
</div>

<script>
function inicio(){
location.reload()
}

function abrirRDO(){
document.getElementById("rdo").style.display="block"
document.getElementById("comparador").style.display="none"
}

function abrirComparador(){
document.getElementById("comparador").style.display="block"
document.getElementById("rdo").style.display="none"
}
</script>

</body>
</html>
