<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Integrado RDO - Samarco</title>
    <style>
        /* Seu CSS existente (mantenha) */
    </style>
</head>
<body>
    <div class="container">
        <!-- Seu conteúdo HTML existente (mantenha) -->
        <div class="cards">...</div>
        <div class="status-bar">...</div>
        <div class="file-list">...</div>
    </div>

    <!-- ========================================= -->
    <!-- ÚNICO PONTO DE CARREGAMENTO DOS SCRIPTS  -->
    <!-- ========================================= -->
    <!-- 1. INJETOR: Ele vai carregar todo o resto na ordem correta -->
    <script src="injetar-sincronizacao.js"></script>

    <!-- 2. Script específico para a página index.html (opcional) -->
    <script>
        // Lógica específica do index, como atualizar status
        (function(){
            console.log('🏠 Página inicial carregada.');

            // Funções para atualizar a interface do index (exemplo)
            function updateIndexStatus() {
                const rdoIndicator = document.getElementById('statusRDO');
                const comparadorIndicator = document.getElementById('statusComparador');
                const lastSyncSpan = document.getElementById('lastSync');

                const rdoLastSync = localStorage.getItem('rdoLastSync');
                const comparadorLastSync = localStorage.getItem('comparadorLastSync');

                if (rdoLastSync) {
                    if(rdoIndicator) rdoIndicator.style.background = '#4caf50';
                    document.getElementById('rdoStatus').textContent = 'Online - Último envio: ' + new Date(parseInt(rdoLastSync)).toLocaleTimeString();
                }
                if (comparadorLastSync) {
                    if(comparadorIndicator) comparadorIndicator.style.background = '#4caf50';
                    document.getElementById('comparadorStatus').textContent = 'Online - Última atualização: ' + new Date(parseInt(comparadorLastSync)).toLocaleTimeString();
                }

                const lastSync = localStorage.getItem('lastComparadorSync') || localStorage.getItem('rdoLastSync');
                if (lastSync && lastSyncSpan) {
                    lastSyncSpan.textContent = new Date(parseInt(lastSync)).toLocaleString();
                }
            }
            updateIndexStatus();
            setInterval(updateIndexStatus, 5000);

            // Lógica dos botões de navegação
            document.getElementById('btnTop')?.addEventListener('click', ()=> window.scrollTo({top:0, behavior:'smooth'}));
            // Certifique-se de que os nomes dos arquivos aqui correspondam EXATAMENTE aos nomes no seu servidor
            const rdoHref = "Correias-RDO-multi-v1.3f-3fnal%20(5).html"; // Nome codificado
            const compHref = "Comparador_V70_GRAFICOS_ORIGINAIS_OP_FIX2_TABLESYS%20(2).html"; // Nome codificado
            const aR = document.getElementById('btnOpenRDO'); if(aR && rdoHref) aR.href = rdoHref;
            const aC = document.getElementById('btnOpenComp'); if(aC && compHref) aC.href = compHref;
        })();
    </script>
    <!-- NÃO carregar Firebase ou outros scripts aqui fora da ordem -->
</body>
</html>
