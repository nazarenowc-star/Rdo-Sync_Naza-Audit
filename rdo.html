  try{ return await domtoimage.toPng(node,{quality:1,cacheBust:true}); }
  catch(e){
    console.warn('domtoimage falhou; tentando novamente com pequeno atraso', e);

}

<script>

// ===== Modo móvel: desativar sticky para facilitar rolagem =====
(function(){
  const isMobile = window.matchMedia('(pointer:coarse)').matches || window.innerWidth < 1024;
  if(isMobile){ document.documentElement.classList.add('mobile'); }
  window.addEventListener('resize', ()=>{
    const mob = window.matchMedia('(pointer:coarse)').matches || window.innerWidth < 1024;
    document.documentElement.classList.toggle('mobile', mob);
  });
})();
// ===== Dados base =====
const MAP = {
  "Sul 1": ["11CR12","11CV72","02CV002"],
  "Sul 2": ["11LK03","11CR14","02CV009","11CV68","11CV67","11CV07","11CR05","11CV69","Hopper 19","11CV73"],
  "Centro": ["11CR13","02CV037-041","11CV21","11CV64","11LK01","11CV20","Hopper 13","02CV41","02CV39"],
  "Norte": ["11CR03","11CR10","11CR15","11CV23","11CV24","11CV70","Lokotrack 01"],
  "Fazendão": ["11LK02","11CV56","Lokotrack 02"]
};
const LABELS = {
  C1:"Roletes/tambores", C2:"Alinhamento", C3:"Emendas/Cobertura", C4:"Raspadores", C5:"Vedação de chutes",
  P1:"Lubrificação", P2:"Motor (A/Temp)", P3:"Raspadores secundários", P4:"Retorno limpo", P5:"Roletes de impacto",
  M1:"Treinamento", M2:"Registro de falhas", M3:"Sensores", M4:"Ambiental"
};
const GROUPS = {criticos:["C1","C2","C3","C4","C5"], preventivos:["P1","P2","P3","P4","P5"], melhoria:["M1","M2","M3","M4"]};

let EQUIPS = []; // {id, sistema, codigo, alias, status:{}, obs:'', photos:[{blob,t,m}], probsSel:[]}
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));

$('#dateBadge').textContent = new Date().toLocaleString('pt-BR');

// Popular lista ao escolher sistema
const equipList = $('#equipList');
$('#sistema').addEventListener('change', ()=>{
  equipList.innerHTML = '';
  (MAP[$('#sistema').value]||[]).forEach(v=>{
    const o=document.createElement('option'); o.value=v; o.textContent=v; equipList.appendChild(o);
  });
});

// Adicionar selecionados
$('#addEquip').onclick = ()=>{
  const sis = $('#sistema').value;
  const sel = Array.from(equipList.selectedOptions).map(o=>o.value);
  if(!sis || !sel.length){ alert('Selecione o Sistema e marque pelo menos um equipamento.'); return; }
  sel.forEach(code=>{
    if(EQUIPS.some(x=>x.codigo===code)) return;
    EQUIPS.push({id: crypto.randomUUID(), sistema:sis, codigo:code, alias: $('#alias').value.trim(), status:{}, obs:'', photos:[], probsSel:[]});
  });
  $('#alias').value='';
  render(); updatePreview();
};

// Busca rápida
$('#buscar').addEventListener('input', ()=>{
  const q = $('#buscar').value.toLowerCase();
  $$('.card').forEach(c=>{
    const txt = c.textContent.toLowerCase();
    c.style.display = txt.includes(q) ? '' : 'none';
  });
});

// Marcar tudo OK
$('#markAllOk').onclick = ()=>{
  EQUIPS.forEach(e=>{
    [...GROUPS.criticos,...GROUPS.preventivos,...GROUPS.melhoria].forEach(k=>e.status[k]='OK');
  });
  render(); updatePreview();
};

// WhatsApp
$('#sendWA').onclick = ()=>{
  const text = buildTextReport();
  const url1 = 'whatsapp://send?text='+encodeURIComponent(text);
  const url2 = 'https://wa.me/?text='+encodeURIComponent(text);
  location.href=url1; setTimeout(()=>location.href=url2, 600);
};

// Copiar texto
$('#copyTxt').onclick = async()=>{
  const text = buildTextReport();
  try{ await navigator.clipboard.writeText(text); alert('Relatório copiado!'); }catch{ alert('Selecione a prévia e copie.'); }
};

// PNG
$('#pngBtn').onclick = async()=>{
  const dataUrl = await makePNG();
  const a = $('#dl'); a.href = dataUrl; a.download = fileName('RDO-CORREIAS'); a.click();
};

function fileName(base){
  const d = new Date();
  const pad = n=>String(n).padStart(2,'0');
  return `${base} - ${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}-${pad(d.getMinutes())}.png`;
}

function render(){
  $('#grid').innerHTML = EQUIPS.map(equipCardHTML).join('');
  wireCards();
}

function equipCardHTML(e){
  const rows = (title, list)=>`
    <div class="group">${title}</div>
    <div class="tablewrap">
      <table class="check">
        <thead><tr><th>Item</th><th>OK</th><th>NÃO OK</th><th>NA</th></tr></thead>
        <tbody>
          ${list.map(k=>`
            <tr>
              <td>${LABELS[k]}</td>
              <td><input type="radio" name="${e.id}_${k}" value="OK"${e.status[k]==='OK'?' checked':''}></td>
              <td><input type="radio" name="${e.id}_${k}" value="NÃO OK"${e.status[k]==='NÃO OK'?' checked':''}></td>
              <td><input type="radio" name="${e.id}_${k}" value="NA"${e.status[k]==='NA'?' checked':''}></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
  const ph = (e.photos||[]).map((p,i)=>`<div class="pwrap"><img src="${p.blob||p.t||p.m}" class="p" alt="foto ${i+1}"/><button class="pdel" data-i="${i}">×</button></div>`).join('');
  return `<div class="card" data-id="${e.id}">
    <div class="card-h">
      <div>
        <div style="font-weight:900">${e.codigo} — ${e.alias||'<span class="hint">Sem nome/local</span>'}</div>
        <div class="hint">Sistema: ${e.sistema}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <label class="btn btn-ghost" style="cursor:pointer"><input class="photoCam" type="file" accept="image/*" capture="environment" multiple style="display:none"/>📷 Câmera</label><label class="btn btn-ghost" style="cursor:pointer"><input class="photoPick" type="file" accept="image/*" multiple style="display:none"/>🗂️ Arquivo</label>
        <button class="btn btn-ghost bDel">Excluir</button>
      </div>
    </div>

    ${rows('🔴 Críticos', GROUPS.criticos)}
    ${rows('🟠 Preventivos', GROUPS.preventivos)}
    ${rows('🟢 Melhoria', GROUPS.melhoria)}

    <div class="group">Problemas (selecione e/ou descreva)</div>
    <div class="probwrap">
      <select class="probSel" multiple size="8">
        <optgroup label="🔧 Mecânica">
          <option>Desalinhamento da correia</option>
          <option>Desgaste/ruptura da correia</option>
          <option>Emenda danificada</option>
          <option>Rasgos/furos</option>
          <option>Roletes travados/desgastados</option>
          <option>Roletes de impacto danificados</option>
          <option>Raspadores ineficientes</option>
          <option>Acúmulo de material no retorno</option>
          <option>Polias com desgaste irregular</option>
          <option>Vibração excessiva</option>
        </optgroup>
        <optgroup label="⚡ Elétrica/Automação">
          <option>Motor superaquecendo</option>
          <option>Falha no acionamento do motor</option>
          <option>Fusível/Disjuntor desarmando</option>
          <option>Sensor de velocidade com falha</option>
          <option>Sensor de desalinhamento com falha</option>
          <option>Chave de emergência com falha</option>
          <option>Painel elétrico com falha</option>
          <option>Intermitência no CLP</option>
        </optgroup>
        <optgroup label="🏗️ Estrutural/Operacional">
          <option>Vedação de chutes com falha</option>
          <option>Vazamento de material</option>
          <option>Travamento por sobrecarga</option>
          <option>Estrutura com trincas</option>
          <option>Drenagem insuficiente</option>
          <option>Suportes da correia danificados</option>
          <option>Contaminação por óleo/graxa</option>
        </optgroup>
        <optgroup label="🛡️ Segurança/Manutenção">
          <option>Proteções fora de posição</option>
          <option>Corrimão/guarda-corpo danificado</option>
          <option>Falta de lubrificação</option>
          <option>Ruído excessivo</option>
          <option>Falta de inspeção preventiva</option>
        </optgroup>
      </select>
      <div class="flex-col" style="flex:1;min-width:260px">
        <details class="collapse">
          <summary>Observações</summary>
          <textarea class="obs" placeholder="Detalhe os NÃO OK: localização, extensão, recomendação..."></textarea>
        </details>
        <div class="chips selChips"></div>
      </div>
    </div>

    <div class="photos">${ph}</div>
  </div>`;
}

function wireCards(){
  $$('.card').forEach(card=>{
    const id = card.getAttribute('data-id');
    const e = EQUIPS.find(x=>x.id===id);

    
    if(!e){ console.warn('Equip não encontrado para card', id); return; }
    if(!Array.isArray(e.probsSel)) e.probsSel = [];
// radios
    [...GROUPS.criticos,...GROUPS.preventivos,...GROUPS.melhoria].forEach(k=>{
      card.querySelectorAll(`input[name="${id}_${k}"]`).forEach(r=>{
        r.onchange = ()=>{ e.status[k]=r.value; updatePreview(); };
      });
    });

    // problemas (multi)
    const psel = card.querySelector('.probSel');
    if(e.probsSel && e.probsSel.length){
      Array.from(psel.options).forEach(o=>{ if((e.probsSel||[]).includes(o.textContent)) o.selected=true; });
    }
    const renderChips=()=>{
      const box = card.querySelector('.selChips');
      box.innerHTML = (e.probsSel||[]).map(t=>`<span class="chip">${t}</span>`).join('');
    };
    psel.onchange = ()=>{
      e.probsSel = Array.from(psel.selectedOptions).map(o=>o.textContent);
      renderChips(); updatePreview();
    };
    renderChips();

    // obs
    const obs = card.querySelector('.obs'); obs.value = e.obs||'';
    obs.oninput = ()=>{ e.obs = obs.value; updatePreview(); };

    // excluir equip
    card.querySelector('.bDel').onclick = ()=>{
      EQUIPS = EQUIPS.filter(z=>z.id!==id); render(); updatePreview();
    };

    // fotos
    card.querySelectorAll('.pdel').forEach(btn=>btn.onclick=()=>{
      const i = +btn.dataset.i; const p=e.photos[i]; if(p && p.blob){ try{ URL.revokeObjectURL(p.blob); }catch{} }
      e.photos.splice(i,1); render(); updatePreview();
    });
    const cam = card.querySelector('.photoCam');
    const pick = card.querySelector('.photoPick');
    const handleFiles = async (files)=>{
      for(const f of files){
        const blobURL = URL.createObjectURL(f);
        const idx = (e.photos.push({blob:blobURL}) - 1);
        render(); // preview na hora
        try{
          const {t,m} = await convertToThumbs(f, 92*2, 1024);
          if(e.photos[idx]){ e.photos[idx] = {t,m}; URL.revokeObjectURL(blobURL); }
          render(); updatePreview();
        }catch(err){ console.warn('conv falhou, mantém blob',err); }
      }
      updatePreview();
    };
    cam.onchange = ev => handleFiles(Array.from(ev.target.files||[]));
    pick.onchange = ev => handleFiles(Array.from(ev.target.files||[]));
  });
}

// ===== Conversão de imagens (leve) =====
function convertToThumbs(file, thumbW=200, midW=1024){
  return new Promise(async (resolve, reject)=>{
    try{
      if('createImageBitmap' in window){
        const bmp = await createImageBitmap(file);
        const t = bitmapToDataURL(bmp, Math.min(1, thumbW/bmp.width), .7);
        const m = bitmapToDataURL(bmp, Math.min(1, midW/bmp.width), .85);
        resolve({t,m}); return;
      }
    }catch(e){}
    const fr = new FileReader();
    fr.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        try{
          const t = imageToDataURL(img, Math.min(1, thumbW/img.width), .7);
          const m = imageToDataURL(img, Math.min(1, midW/img.width), .85);
          resolve({t,m});
        }catch(err){ reject(err); }
      };
      img.onerror = reject; img.src = fr.result;
    };
    fr.onerror = reject; fr.readAsDataURL(file);
  });
}
function bitmapToDataURL(bmp, scale=1, q=.8){
  const c=document.createElement('canvas'); c.width=Math.max(1,Math.round(bmp.width*scale)); c.height=Math.max(1,Math.round(bmp.height*scale));
  c.getContext('2d').drawImage(bmp,0,0,c.width,c.height); return c.toDataURL('image/jpeg',q);
}
function imageToDataURL(img, scale=1, q=.8){
  const c=document.createElement('canvas'); c.width=Math.max(1,Math.round(img.width*scale)); c.height=Math.max(1,Math.round(img.height*scale));
  c.getContext('2d').drawImage(img,0,0,c.width,c.height); return c.toDataURL('image/jpeg',q);
}

// ===== Texto do relatório (WhatsApp/Prévia) — VERTICAL =====
function buildOneText(e){
  const keys=[...GROUPS.criticos,...GROUPS.preventivos,...GROUPS.melhoria];
  const probs = keys.filter(k=>e.status[k]==='NÃO OK').map(k=>'│  │  ├─ '+LABELS[k]).join('\n') || '│  │  └─ Nenhum';

  const linesFor = (arr, icon)=>{
    return [
      `│  ├─ ${icon}`,
      ...arr.map(k=>`│  │  - ${LABELS[k]}: ${e.status[k]||'_'}`)
    ].join('\n');
  };

  return [
    `├─ 🎯 ${e.codigo} — ${e.alias||'-'}`,
    `│  ├─ Sistema: ${e.sistema}`,
    linesFor(GROUPS.criticos,'🔴 Críticos'),
    linesFor(GROUPS.preventivos,'🟠 Preventivos'),
    linesFor(GROUPS.melhoria,'🟢 Melhoria'),
    `├─ ⚠️ Problemas selecionados: ${(e.probsSel&&e.probsSel.length)? e.probsSel.join(', '): '-'}`,
    `├─ ⚠️ Problemas`,
    probs,
    `└─ 📝 ${e.obs||'-'}`
  ].join('\n');
}
function buildTextReport(){
  const ctx = [
    '🧭 RDO-OPERAÇÃO SISTEMA DE CORREIAS',
    `├─ Data: ${$('#data').value||'-'}`,
    `├─ Turno: ${$('#turno').value||'-'}`,
    `├─ Escala: ${$('#escala').value||'-'}`,
    `├─ Operador: ${$('#operador').value||'-'}`,
    `└─ Equipe: ${$('#equipe').value||'-'}`
  ].join('\n');
  const itens = EQUIPS.map(buildOneText).join('\n\n');
  return ctx + '\n\n' + itens + '\n\n' + '📎 Fotos: vistas no app; anexe as principais no envio.';
}
function updatePreview(){ $('#preview').textContent = buildTextReport(); }
updatePreview();

// ===== Relatório Visual (PNG) =====
function buildReportDOM(){
  const root = $('#reportRoot');
  const head = $('#reportHeader');
  const grid = $('#reportGrid');
  head.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #e5e7eb;padding-bottom:8px;margin-bottom:10px">
    <div><div style="font-size:18px;font-weight:900;color:#111827">🧭 RDO-OPERAÇÃO SISTEMA DE CORREIAS — CRD/SAMARCO</div>
    <div style="color:#6b7280">Data: ${$('#data').value||'-'} • Turno: ${$('#turno').value||'-'} • Escala: ${$('#escala').value||'-'} • Operador: ${$('#operador').value||'-'} • Equipe: ${$('#equipe').value||'-'}</div></div>
    <div style="font-weight:800">${new Date().toLocaleString('pt-BR')}</div></div>`;
  grid.innerHTML = EQUIPS.map(e=>{
    return `<div class="r-card">
      <div style="font-weight:900;color:#1f2937">${e.codigo} — ${e.alias||'-'}</div>
      <div style="font-size:12px;color:#6b7280">Sistema: ${e.sistema}</div>
      <div style="margin-top:6px;font-size:12px">
        <div>🔴 ${GROUPS.criticos.map(k=>LABELS[k]+': '+(e.status[k]||'_')).join(' | ')}</div>
        <div>🟠 ${GROUPS.preventivos.map(k=>LABELS[k]+': '+(e.status[k]||'_')).join(' | ')}</div>
        <div>🟢 ${GROUPS.melhoria.map(k=>LABELS[k]+': '+(e.status[k]||'_')).join(' | ')}</div>
        <div>⚠️ Selecionados: ${(e.probsSel&&e.probsSel.length)? e.probsSel.join(', '): '-'}</div>
        <div>📝 ${e.obs||''}</div>
      </div>
      <div>${(e.photos||[]).map(p=>`<img class="rp" src="${p.m||p.t||p.blob}" alt="foto ${e.codigo}"/>`).join('')}</div>
    </div>`;
  }).join('');
  return root;
}

async function ensurePhotosData(){
  // Converte qualquer blob: em DataURL p/ o PNG não "perder" fotos
  const convertBlobUrl = async (url)=>{
    try{
      const res = await fetch(url); const blob = await res.blob();
      if('createImageBitmap' in window){
        const bmp = await createImageBitmap(blob);
        return bitmapToDataURL(bmp, 1, .9);
      } else {
        const fr = new FileReader();
        return await new Promise((resolve, reject)=>{
          fr.onload = ()=>resolve(fr.result); fr.onerror = reject; fr.readAsDataURL(blob);
        });
      }
    }catch(e){ console.warn('conv blob->dataURL falhou', e); return url; }
  };
  for(const e of EQUIPS){
    for(const p of (e.photos||[])){
      if(!p.m && !p.t && p.blob && p.blob.startsWith('blob:')){
        p.m = await convertBlobUrl(p.blob);
      }
    }
  }
}

async function makePNG(){
  const _root = document.getElementById('reportRoot');
  _root.classList.add('force3');
  await ensurePhotosData();
  const node=buildReportDOM();
  node.classList.add('force3');
  const out = await domtoImageSafe(node);
  node.classList.remove('force3');
  return out;
}

async function domtoImageSafe(node){
  try{ return await domtoimage.toPng(node,{quality:1,cacheBust:true}); }
  catch(e){
    console.warn('domtoimage falhou; tentando novamente com pequeno atraso', e);
    await new Promise(r=>setTimeout(r, 30));
    return await domtoimage.toPng(node,{quality:1,cacheBust:true});
  }
}

</script>

<script>
(function(){
  const PATH_COL = "rdo_operadores";
  const PATH_DOC = "live";
  let lastText = "";
  let tmr = null;

  function getPreviewText(){
    const el = document.getElementById("preview");
    return (el?.innerText || el?.textContent || "").trim();
  }

  async function syncFirebaseNow(text){
    if(!text || !text.trim()) return;
    if(!window.__db){
      console.warn("⚠️ __db não inicializado");
      return;
    }
    try{
      await window.__db.collection(PATH_COL).doc(PATH_DOC).set({
        text: text,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        source: "rdo"
      }, {merge:true});
    }catch(e){
      console.warn("❌ sync falhou:", e);
    }
  }

  function scheduleSync(text){
    clearTimeout(tmr);
    tmr = setTimeout(()=> syncFirebaseNow(text), 350);
  }

  function onChange(){
    const text = getPreviewText();
    if(!text) return;
    if(text === lastText) return;
    lastText = text;
    scheduleSync(text);
  }

  function start(){
    const el = document.getElementById("preview");
    if(el){
      const mo = new MutationObserver(onChange);
      mo.observe(el, {subtree:true, childList:true, characterData:true});
    }
    setInterval(onChange, 800);
    setTimeout(onChange, 300);
  }

  window.addEventListener("load", start);
  window.syncFirebase = ()=> syncFirebaseNow(getPreviewText());
})();
</script>
