<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sala de Controle — RDO + Comparador</title>
<style>
:root{
  --sam-blue:#005c8f; --sam-green:#3a9d5d; --bg:#f3f6fb; --border:#d5dde7; --card:#ffffff;
  --shadow:0 10px 28px rgba(2,8,23,.08);
}
*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
body{margin:0;background:var(--bg);color:#0f172a;height:100vh;overflow:hidden}
header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;background:#fff;border-bottom:1px solid var(--border);box-shadow:var(--shadow);
}
.brand{display:flex;align-items:center;gap:12px}
.mark{
  width:44px;height:44px;border-radius:14px;
  background:linear-gradient(135deg,var(--sam-blue),var(--sam-green));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;
}
h1{margin:0;font-size:16px;color:var(--sam-blue)}
.sub{font-size:12px;color:#64748b}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{
  border:none;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:800;
  background:#eef2ff;color:#1f2937;border:1px solid var(--border);
}
.btn.primary{background:var(--sam-blue);border-color:var(--sam-blue);color:#fff}
.btn:active{transform:translateY(1px)}
main{height:calc(100vh - 78px);padding:12px}
.grid{height:100%;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.phead{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.phead .title{font-weight:900;color:#0f172a;font-size:13px}
.phead .hint{font-size:11px;color:#64748b}
iframe{border:0;width:100%;height:100%;background:#fff}
@media (max-width: 1100px){
  body{overflow:auto}
  main{height:auto}
  .grid{grid-template-columns:1fr; height:auto}
  .panel{height:88vh}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="mark">SM</div>
    <div>
      <h1>Sala de Controle — RDO Operadores + Comparador V70</h1>
      <div class="sub">Digitação no RDO ➜ Firebase ➜ Comparador atualiza e processa automaticamente</div>
    </div>
  </div>
  <div class="actions">
    <button class="btn" onclick="showBoth()">🧩 Ambos</button>
    <button class="btn" onclick="showRDO()">🧭 Só RDO</button>
    <button class="btn" onclick="showComp()">📊 Só Comparador</button>
    <button class="btn primary" onclick="reloadAll()">🔄 Recarregar</button>
  </div>
</header>

<main>
  <div class="grid" id="grid">
    <section class="panel" id="pRDO">
      <div class="phead">
        <div>
          <div class="title">🧭 RDO Operadores</div>
          <div class="hint">Gera prévia + envia WhatsApp + grava realtime no Firebase</div>
        </div>
      </div>
      <iframe id="frameRDO" src="rdo.html" loading="lazy" referrerpolicy="no-referrer"></iframe>
    </section>

    <section class="panel" id="pComp">
      <div class="phead">
        <div>
          <div class="title">📊 Comparador V70</div>
          <div class="hint">Recebe do Firebase e aciona “Processar” automaticamente</div>
        </div>
      </div>
      <iframe id="frameComp" src="comparador.html" loading="lazy" referrerpolicy="no-referrer"></iframe>
    </section>
  </div>
</main>

<script>
function showBoth(){
  document.getElementById('pRDO').style.display='';
  document.getElementById('pComp').style.display='';
  document.getElementById('grid').style.gridTemplateColumns='1fr 1fr';
}
function showRDO(){
  document.getElementById('pRDO').style.display='';
  document.getElementById('pComp').style.display='none';
  document.getElementById('grid').style.gridTemplateColumns='1fr';
}
function showComp(){
  document.getElementById('pComp').style.display='';
  document.getElementById('pRDO').style.display='none';
  document.getElementById('grid').style.gridTemplateColumns='1fr';
}
function reloadAll(){
  try { document.getElementById('frameRDO').contentWindow.location.reload(); } catch(e){}
  try { document.getElementById('frameComp').contentWindow.location.reload(); } catch(e){}
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
(function(){
  const firebaseConfig = {
    apiKey:"AIzaSyDneReMjO78JqJ-LvmSTiQqUMkxT97H6JE",
    authDomain:"naza-auditoria-hub.firebaseapp.com",
    databaseURL:"https://naza-auditoria-hub-default-rtdb.firebaseio.com",
    projectId:"naza-auditoria-hub"
  };

  const SENSOR_APP_NAME = 'sensorPortalControle';
  const sensorApp = firebase.apps.find(app => app.name === SENSOR_APP_NAME) || firebase.initializeApp(firebaseConfig, SENSOR_APP_NAME);
  const db = sensorApp.database();
  const SISTEMA_ID = 'controle';

  function numFromText(txt){
    const m = String(txt || '').replace(/\./g,'').replace(',','.').match(/-?\d+(?:\.\d+)?/);
    return m ? Number(m[0]) : 0;
  }

  function normalizeText(s){
    return String(s || '').replace(/\s+/g,' ').trim();
  }

  function findBlockByTitle(doc, titlePattern){
    const nodes = [...doc.querySelectorAll('h1,h2,h3,h4,h5,h6,strong,div,p,span')];
    for(const node of nodes){
      const text = normalizeText(node.textContent);
      if(titlePattern.test(text)){
        return node.closest('div,section,article,.card,.analysis-card') || node.parentElement || node;
      }
    }
    return null;
  }

  function textInBlock(block){
    return normalizeText(block ? block.innerText || block.textContent || '' : '');
  }

  function extractConsistency(doc){
    const block = findBlockByTitle(doc, /Consist[eê]ncia OP x MES/i);
    const text = textInBlock(block);
    const m = text.match(/(\d+(?:[.,]\d+)?)\s*%/);
    return m ? Number(m[1].replace(',','.')) : 0;
  }

  function extractOperators(doc){
    const block = findBlockByTitle(doc, /Dados dos Operadores/i);
    const text = textInBlock(block);
    const op = text.match(/(\d+)\s*operador/i);
    return op ? Number(op[1]) : 0;
  }

  function extractSistemaEstruturado(doc){
    const block = findBlockByTitle(doc, /Dados dos Operadores|Estat[ií]sticas de Processamento/i);
    const text = textInBlock(block);
    const sistema = text.match(/Sistema:\s*(\d+)/i);
    const estruturado = text.match(/Estruturado:\s*(\d+)/i);
    return {
      sistema: sistema ? Number(sistema[1]) : 0,
      estruturado: estruturado ? Number(estruturado[1]) : 0
    };
  }

  function extractMes(doc){
    const block = findBlockByTitle(doc, /Dados do MES/i);
    const text = textInBlock(block);
    const registros = text.match(/(\d+)\s*registros totais/i);
    const equipamentos = text.match(/(\d+)\s*equipamentos/i);
    return {
      registros: registros ? Number(registros[1]) : 0,
      equipamentos: equipamentos ? Number(equipamentos[1]) : 0
    };
  }

  function extractCriticals(doc){
    const block = findBlockByTitle(doc, /Problemas Cr[ií]ticos Identificados/i);
    const text = textInBlock(block);
    if(/Nenhum problema cr[ií]tico/i.test(text) || /Situa[cç][aã]o Normal/i.test(text)) return 0;

    const equip = text.match(/(\d+)\s*equipamentos?\s+com\s+problemas?/i);
    if(equip) return Number(equip[1]);

    const itens = text.match(/(\d+)\s*itens?\s+n[aã]o ok/i);
    if(itens) return Number(itens[1]);

    const bullets = (text.match(/•/g) || []).length;
    return bullets > 0 ? bullets : 0;
  }

  function extractAdvanced(doc){
    const block = findBlockByTitle(doc, /Estat[ií]sticas Avan[cç]adas/i);
    const text = textInBlock(block);
    const cat = text.match(/Categoria Mais Frequente[\s\S]*?(\d+)\s*ocorr[eê]ncias/i);
    const equip = text.match(/Equipamento Mais Problem[aá]tico[\s\S]*?(\d+)\s*problemas?/i);
    return {
      categoriaOcorrencias: cat ? Number(cat[1]) : 0,
      equipamentoProblemas: equip ? Number(equip[1]) : 0
    };
  }

  function extractFallbackProcessing(doc){
    const block = findBlockByTitle(doc, /Estat[ií]sticas de Processamento|Processamento Sistema/i);
    const text = textInBlock(block);
    const eventos = text.match(/Eventos processados:\s*(\d+)/i);
    const media = text.match(/M[eé]dia:\s*(\d+(?:[.,]\d+)?)%/i);
    return {
      eventos: eventos ? Number(eventos[1]) : 0,
      media: media ? Number(media[1].replace(',','.')) : 0
    };
  }

  function coletar(){
    let consistencia = 0;
    let operadores = 0;
    let criticos = 0;
    let mesRegistros = 0;
    let sistema = 0;
    let estruturado = 0;
    let mesEquip = 0;
    let equipamentoProblemas = 0;
    let categoriaOcorrencias = 0;
    let eventosProcessados = 0;

    try{
      const comp = document.getElementById('frameComp')?.contentDocument;
      if(comp){
        consistencia = extractConsistency(comp);
        operadores = extractOperators(comp);
        criticos = extractCriticals(comp);

        const se = extractSistemaEstruturado(comp);
        sistema = se.sistema;
        estruturado = se.estruturado;

        const mes = extractMes(comp);
        mesRegistros = mes.registros;
        mesEquip = mes.equipamentos;

        const adv = extractAdvanced(comp);
        equipamentoProblemas = adv.equipamentoProblemas;
        categoriaOcorrencias = adv.categoriaOcorrencias;

        const fallback = extractFallbackProcessing(comp);
        eventosProcessados = fallback.eventos;
        if(consistencia === 0 && fallback.media > 0) consistencia = fallback.media;
        if(criticos === 0 && equipamentoProblemas > 0) criticos = equipamentoProblemas;
        if(mesRegistros === 0 && eventosProcessados > 0) mesRegistros = eventosProcessados;
      }
    }catch(e){
      console.warn('Leitura do comparador falhou', e);
    }

    return {
      sistema: SISTEMA_ID,
      valores: [
        Number((consistencia || 0).toFixed(1)),
        operadores || 0,
        criticos || 0,
        mesRegistros || 0
      ],
      dadosCompletos: {
        consistencia: Number((consistencia || 0).toFixed(1)),
        operadores: operadores || 0,
        criticos: criticos || 0,
        mesRegistros: mesRegistros || 0,
        sistema: sistema || 0,
        estruturado: estruturado || 0,
        mesEquipamentos: mesEquip || 0,
        equipamentoProblemas: equipamentoProblemas || 0,
        categoriaOcorrencias: categoriaOcorrencias || 0,
        eventosProcessados: eventosProcessados || 0
      },
      timestamp: Date.now()
    };
  }

  function enviar(){
    const payload = coletar();
    db.ref('sensores/' + SISTEMA_ID)
      .set(payload)
      .then(() => console.log('🟢 Sensor Controle ativo', payload))
      .catch((err) => console.error('❌ Erro Sensor Controle:', err));
  }

  setTimeout(enviar, 7000);
  setInterval(enviar, 30000);
})();
</script>
</body>
</html>
